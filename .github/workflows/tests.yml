# .github/workflows/tests.yml
# CI/CD — Lance les tests pytest à chaque push sur main

name: Tests Pipeline Data

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Configuration Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installation des dépendances
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy matplotlib seaborn pytest requests beautifulsoup4

      - name: Lancement des tests pytest
        run: |
          python -m pytest tests/ -v